<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
    form 태그는 여러개의 input을 묶어서 한꺼번에 전송할 떄 묶는 역할을 하는데,
    2가지방식으로 전달이 가능함
    1. GET 방식
        - 주소줄에 내용을 전달하는방식
    2. POST 방식
    - 주소줄에 내용을 전달하지 않고, body에 내용을 전달하는 방식
 -->
<h1>GET 방식</h1>
<form method="get" action="https://postman-echo.com/get">
    <label>이름:<input tupe="text" name="name"></label><br />
    <label>이메일:<input type="email" name="email" </label><br />
    <lavel>비밀번호:<input type="password"  name="password" </lavel><br />
    <button type="submit">전송</button>
    </form>


    <h1>POST 방식</h1>
    <form method="post" action="https://postman-echo.com/post">
        <label>이름:<input tupe="text" name="name"></label><br />
        <label>이메일:<input type="email" name="email" </label><br />
        <lavel>비밀번호:<input type="password"  name="password" </lavel><br />
        <button>전송</button>

</form>
</body>
</html>
